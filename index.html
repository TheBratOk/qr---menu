<script>
async function sendToTelegram(text) {

const token = "8868629774:AAHfC3znVKypNrPSQuekJp1ckYp51fxeELI";
const chatId = "-5298579696";

await fetch(
`https://api.telegram.org/bot${token}/sendMessage`,
{

headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
chat_id: chatId,

})
}
);

}
function summa() {

}

if(cola > 0){

zakaz += "🥤 Кола x" + cola + "\n";
}

if(zakaz == ""){
alert("Выберите хотя бы одно блюдо");
return;
}

let message =
"Новый заказ\n\n" +
"Столик: " + table +
"\n\n" +
zakaz +
"\nСумма: " + total + " ₸";

}
