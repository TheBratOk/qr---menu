<h1>Кафе Вкусно</h1>

<label>
<input type="checkbox" id="burger">
🍔 Бургер — 2500 ₸
</label>

<br><br>

<label>
<input type="checkbox" id="pizza">
🍕 Пицца — 3500 ₸
</label>

<br><br>

<label>
<input type="checkbox" id="cola">
🥤 Кола — 700 ₸
</label>

<br><br>

Номер столика:

<input type="number" id="table" value="1">

<br><br>

<button onclick="summa()">
Посчитать заказ
</button>

<script>
function summa() {

let total = 0;
let zakaz = "";

if(document.getElementById("burger").checked){
total += 2500;
zakaz += "🍔 Бургер\n";
}

if(document.getElementById("pizza").checked){
total += 3500;
zakaz += "🍕 Пицца\n";
}

if(document.getElementById("cola").checked){
total += 700;
zakaz += "🥤 Кола\n";
}

let table = document.getElementById("table").value;

if(zakaz == ""){
alert("Выберите хотя бы одно блюдо");
return;
}

alert(
"Новый заказ\n\n" +
"Столик: " + table +
"\n\n" +
zakaz +
"\nСумма: " + total + " ₸"
);

}
</script>
