<style>
body{
  font-family: Arial, sans-serif;
  background:#121212;
color:white;

  padding:20px;
}

.container{
  max-width:500px;

}

h1{

.card{

  width:70px;

button{
  width:100%;
  background:#ff6600;
  color:white;
  border:none;
  padding:15px;
  border-radius:10px;

}

button:hover{
  opacity:0.9;

</style>

<div class="container">

<h1>🍔 Аида xlox </h1>

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300"
style="width:100%;border-radius:10px;">

<br><br>

🍔 Бургер — 2500 ₸

<input type="number" id="burgerCount" value="0" min="0">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300"
style="width:100%;border-radius:10px;">

<br><br>

🍕 Пицца — 3500 ₸

<input type="number" id="pizzaCount" value="0" min="0">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1629203851122-3726ecdf080e?w=300"
style="width:100%;border-radius:10px;">

<br><br>

🥤 Кола — 700 ₸

<input type="number" id="colaCount" value="0" min="0">
</div>

<div class="card">
Номер столика:
<br><br>
<input type="number" id="table" value="1">
</div>

<button onclick="summa()">🍔 Отправить заказ</button>

<button onclick="clearOrder()">🗑 Очистить</button>

<button onclick="showStats()">📊 Статистика</button>

<button onclick="orderReady()">✅ Заказ готов</button>

  <script>
function clearOrder() {
document.getElementById("burgerCount").value = 0;
document.getElementById("pizzaCount").value = 0;
document.getElementById("colaCount").value = 0;
document.getElementById("table").value = 1;
}
  function orderReady() {
  sendToTelegram("🟢 Заказ готов!");
  alert("Сообщение отправлено");
    }
function showStats() {
  alert(
    "📊 Статистика\n\n" +
    "Заказов: " + totalOrders +
    "\n\nВыручка: " + totalRevenue + " ₸"
  );
}
  
async function sendToTelegram(text) {

const token = "8868629774:AAEcJ-7d5HtiF3lNOjeBTxxSVV6oxCNB7Tg";
const chatId = "-5298579696";

await fetch(
`https://api.telegram.org/bot${token}/sendMessage`,
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
chat_id: chatId,
text: text
})
}
);

}

let totalRevenue = Number(localStorage.getItem("totalRevenue")) || 0;
let totalOrders = Number(localStorage.getItem("totalOrders")) || 0;
let orderNumber = Number(localStorage.getItem("orderNumber")) || 1;

function summa() {

let total = 0;
let zakaz = "";

let burger = Number(document.getElementById("burgerCount").value);
let pizza = Number(document.getElementById("pizzaCount").value);
let cola = Number(document.getElementById("colaCount").value);

if(burger > 0){
total += burger * 2500;
zakaz += "🍔 Бургер x" + burger + "\n";
}

if(pizza > 0){
total += pizza * 3500;
zakaz += "🍕 Пицца x" + pizza + "\n";
}

if(cola > 0){
total += cola * 700;
zakaz += "🥤 Кола x" + cola + "\n";
}

let table = document.getElementById("table").value;

if(zakaz == ""){
alert("Выберите хотя бы одно блюдо");
return;
}

const now = new Date();

const time =
now.getHours().toString().padStart(2, '0') +
':' +
now.getMinutes().toString().padStart(2, '0');

let message =
"🆕 Заказ №" + orderNumber + "\n\n" +
"⏰ Время: " + time +
"\n🍽 Столик: " + table +
"\n\n" +
zakaz +
"\n💰 Сумма: " + total + " ₸" +
"\n\n🟡 Статус: Готовится";

sendToTelegram(message);
totalOrders++;
totalRevenue += total;

localStorage.setItem("totalOrders", totalOrders);
localStorage.setItem("totalRevenue", totalRevenue);
  
orderNumber++;
localStorage.setItem("orderNumber", orderNumber);

alert("Заказ отправлен!");

}
</script>
